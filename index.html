<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="calculator">

      <!-- History Panel -->
      <div class="history-panel" id="historyPanel">
        <div class="history-header">
          <span>History</span>
          <button class="history-clear" onclick="clearHistory()">Clear</button>
        </div>
        <ul class="history-list" id="historyList">
          <li class="history-empty">No calculations yet</li>
        </ul>
      </div>

      <div class="display">
        <button class="history-toggle" id="historyToggle" onclick="toggleHistory()" title="History">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="btn span-two clear" onclick="clearAll()">AC</button>
        <button class="btn toggle" onclick="toggleSign()">+/−</button>
        <button class="btn operator" onclick="inputOperator('%')">%</button>

        <button class="btn" onclick="inputDigit('7')">7</button>
        <button class="btn" onclick="inputDigit('8')">8</button>
        <button class="btn" onclick="inputDigit('9')">9</button>
        <button class="btn operator" onclick="inputOperator('÷')">÷</button>

        <button class="btn" onclick="inputDigit('4')">4</button>
        <button class="btn" onclick="inputDigit('5')">5</button>
        <button class="btn" onclick="inputDigit('6')">6</button>
        <button class="btn operator" onclick="inputOperator('×')">×</button>

        <button class="btn" onclick="inputDigit('1')">1</button>
        <button class="btn" onclick="inputDigit('2')">2</button>
        <button class="btn" onclick="inputDigit('3')">3</button>
        <button class="btn operator" onclick="inputOperator('−')">−</button>

        <button class="btn span-two" onclick="inputDigit('0')">0</button>
        <button class="btn" onclick="inputDot()">.</button>
        <button class="btn operator equals" onclick="calculate()">=</button>

        <button class="btn operator" onclick="inputOperator('+')">+</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
